name: Generate Snake Animation

# Katkı grafiğini "yılan" animasyonuna çevirir ve `output` branch'ine yazar.
# README'deki <picture> bloğu bu branch'teki SVG'leri gösterir.

on:
  schedule:
    # Her 12 saatte bir güncelle (UTC).
    - cron: "0 */12 * * *"
  workflow_dispatch: # Actions sekmesinden elle tetiklenebilir.
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs (light + dark)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.svg?palette=github-dark

      - name: Push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
